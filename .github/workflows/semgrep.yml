# .github/workflows/semgrep-ssc-compare.yml
#
# Runs Semgrep over a corpus of GitHub Actions workflow YAMLs with two
# configurations and produces a side-by-side comparison:
#
#   baseline  = p/github-actions          (exactly what the paper used)
#   extended  = p/github-actions + your new supply-chain rules
#
# The job emits JSON for both runs, aggregates per rule and per weakness, and
# writes a Markdown report to the job summary plus downloadable artifacts.
#
# This is a benchmark job (full scan, no Semgrep Cloud token needed). It uses
# `semgrep scan`, NOT `semgrep ci` (which is diff-aware and needs SEMGREP_APP_TOKEN).

name: semgrep-supply-chain-compare

on:
  workflow_dispatch:
    inputs:
      scan_path:
        description: "Directory of workflow YAMLs to scan"
        default: "dataset/workflows"
        required: true
  push:
    paths:
      - ".github/workflows/semgrep-ssc-compare.yml"
      - "scripts/compare_semgrep.py"
      - "custom-rules/**"

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    container:
      # Pin to a digest in production for reproducibility, e.g.
      #   image: semgrep/semgrep@sha256:<digest>
      image: semgrep/semgrep
    env:
      SCAN_PATH: ${{ github.event.inputs.scan_path || 'dataset/workflows' }}
      SEMGREP_FLAGS: "--metrics=off --disable-version-check --no-git-ignore --quiet"
    steps:
      - name: Checkout
        uses: actions/checkout@v4   # pin to a commit SHA in production (frizbee/poutine will flag this)

      # --- Baseline: the paper's exact config --------------------------------
      - name: Semgrep baseline (p/github-actions)
        run: |
          semgrep scan \
            --config "p/github-actions" \
            --json --output baseline.json \
            $SEMGREP_FLAGS \
            "$SCAN_PATH" || true

      # --- Extended: baseline + your new supply-chain rules ------------------
      # Drop the rules you want to try into custom-rules/. To also pull in
      # Trail of Bits' GitHub Actions supply-chain rules, uncomment the clone
      # step below and add `--config vendor/tob-rules/github_actions`.
      - name: Semgrep extended (baseline + supply-chain)
        run: |
          semgrep scan \
            --config "p/github-actions" \
            --config "custom-rules/" \
            --json --output extended.json \
            $SEMGREP_FLAGS \
            "$SCAN_PATH" || true

      # - name: Fetch Trail of Bits rules (optional, pinned)
      #   run: |
      #     git clone --depth 1 https://github.com/trailofbits/semgrep-rules vendor/tob-rules
      #     git -C vendor/tob-rules checkout <PINNED_SHA>

      # --- Compare -----------------------------------------------------------
      - name: Compare results
        run: |
          python3 scripts/compare_semgrep.py \
            --run baseline:baseline.json \
            --run extended:extended.json \
            --out-md  semgrep_compare_report.md \
            --out-csv semgrep_compare.csv
          {
            echo "## Semgrep comparison"
            cat semgrep_compare_report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4   # pin to a commit SHA in production
        with:
          name: semgrep-comparison
          path: |
            baseline.json
            extended.json
            semgrep_compare_report.md
            semgrep_compare.csv
          if-no-files-found: warn
