name: Simple Semgrep YAML vs Supply Chain Comparison

on:
workflow_dispatch:
inputs:
scan_path:
description: "YAML dataset path"
required: true
default: "github-actions-security/dataset/workflows"

permissions:
contents: read

jobs:
compare-semgrep:
runs-on: ubuntu-latest
container:
image: semgrep/semgrep:latest

```
env:
  SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
  SCAN_PATH: ${{ github.event.inputs.scan_path }}

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Prepare results
    run: mkdir -p results

  - name: Run Semgrep GitHub Actions YAML rules
    run: |
      set +e
      semgrep scan \
        --config p/github-actions \
        --include "*.yml" \
        --include "*.yaml" \
        --json-output results/yaml-scan.json \
        "$SCAN_PATH"
      echo $? > results/yaml-scan.exitcode
      set -e

  - name: Run Semgrep Supply Chain
    run: |
      set +e
      semgrep ci \
        --supply-chain \
        --json-output results/supply-chain.json
      echo $? > results/supply-chain.exitcode
      set -e

  - name: Compare result counts
    run: |
      python3 <<'PY'
      import json
      import csv
      from collections import Counter
      from pathlib import Path

      files = {
          "yaml_rules": Path("results/yaml-scan.json"),
          "supply_chain": Path("results/supply-chain.json"),
      }

      rows = []
      summary = []

      for scan_name, path in files.items():
          if not path.exists():
              summary.append([scan_name, "missing_output", 0])
              continue

          data = json.loads(path.read_text())
          results = data.get("results", [])

          summary.append([scan_name, "total_findings", len(results)])

          by_rule = Counter(r.get("check_id", "unknown") for r in results)
          for rule, count in sorted(by_rule.items()):
              rows.append([scan_name, rule, count])

      with open("results/simple-summary.csv", "w", newline="") as f:
          writer = csv.writer(f)
          writer.writerow(["scan", "metric", "count"])
          writer.writerows(summary)

      with open("results/rules-count.csv", "w", newline="") as f:
          writer = csv.writer(f)
          writer.writerow(["scan", "rule", "count"])
          writer.writerows(rows)

      md = ["# Simple Semgrep comparison", ""]
      md.append("## Total findings")
      md.append("| Scan | Metric | Count |")
      md.append("|---|---|---:|")
      for row in summary:
          md.append(f"| {row[0]} | {row[1]} | {row[2]} |")

      md.append("")
      md.append("## Findings by rule")
      md.append("| Scan | Rule | Count |")
      md.append("|---|---|---:|")
      for scan, rule, count in rows:
          md.append(f"| {scan} | `{rule}` | {count} |")

      Path("results/comparison.md").write_text("\n".join(md) + "\n")
      print("\n".join(md))
      PY

  - name: Add summary to GitHub Actions page
    run: cat results/comparison.md >> "$GITHUB_STEP_SUMMARY"

  - name: Upload results
    uses: actions/upload-artifact@v4
    with:
      name: simple-semgrep-comparison
      path: results/
```
