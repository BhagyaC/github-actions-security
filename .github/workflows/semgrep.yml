# .github/workflows/semgrep-ssc-compare.yml
#
# Compares two Semgrep MODES over the same repo on every push:
#
#   legacy : semgrep scan --config p/github-actions   (the paper's usage)
#            -> token blanked => pure local OSS engine, registry rules only, no upload
#   full   : semgrep ci  (Policy + Pro engine = full potential)
#            -> uploads to your Semgrep AppSec Platform dashboard
#
# `semgrep ci` does a FULL scan on push (correct for a static corpus) and a
# diff-aware scan on pull_request. It auto-applies the Pro Engine (cross-function
# analysis) and your org Policy. NOTE: the Pro *interfile* engine does not cover
# YAML, and Supply Chain (SSC) scans dependency manifests, not workflow YAML — so
# for a pure workflow corpus, ci's gains are rule breadth + severity tiering +
# autofix + triage, not cross-file taint.
#
# Requires the SEMGREP_APP_TOKEN repository secret (already configured).

name: semgrep-supply-chain-compare

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}
  # pull_request: {}   # enable for diff-aware PR scans (canonical semgrep ci flow)

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep   # pin to a digest in production
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4   # pin to a commit SHA in production
        with:
          fetch-depth: 0

      # --- Legacy: the paper's local CLI usage, OSS engine, no cloud ---------
      # Whole-repo scan, but p/github-actions only matches workflow YAML, so this
      # is equivalent to scanning dataset/workflows with those 3 rules.
      - name: Legacy (semgrep scan, p/github-actions, no cloud)
        env:
          SEMGREP_APP_TOKEN: ""   # force pure-OSS, registry-only, like the paper
        run: |
          semgrep scan \
            --config "p/github-actions" \
            --json --output legacy.json \
            --metrics=off --disable-version-check --quiet \
            . || true

      # --- Full ci: Policy + Pro engine + cloud. Uploads to dashboard. -------
      # Default forces broad rules so the comparison is reproducible and always
      # has GitHub Actions coverage. To instead use YOUR cloud Policy as the
      # source of truth (truest "potential of your setup"), delete both --config
      # lines: `semgrep ci --json-output=full.json`.
      - name: Full (semgrep ci, Pro engine + cloud)
        run: |
          semgrep ci \
            --config "p/default" \
            --config "p/github-actions" \
            --json-output=full.json || true

      # --- Compare -----------------------------------------------------------
      - name: Compare results
        run: |
          python3 scripts/compare_semgrep.py \
            --run legacy:legacy.json \
            --run full:full.json \
            --out-md  semgrep_compare_report.md \
            --out-csv semgrep_compare.csv
          {
            echo "## Semgrep: full ci vs legacy CLI"
            cat semgrep_compare_report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4   # pin to a commit SHA in production
        with:
          name: semgrep-comparison
          path: |
            legacy.json
            full.json
            semgrep_compare_report.md
            semgrep_compare.csv
          if-no-files-found: warn
